<head>
    <meta charset="utf-8" />

    <!-- Fonts: Merriweather (headings), Inter (body), JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet" />
    <!-- Bootstrap Icons (self-hosted, pinned 1.11.3) -->
    <link href="lib/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Base styles -->
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link href="_content/DevExpress.Blazor.Themes/office-white.bs5.min.css" rel="stylesheet" />
    <link href="lib/maplibre-gl/maplibre-gl.css" rel="stylesheet" />
    <!-- OvčinaHra theme -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/ovcinahra-theme.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="OvcinaHra.Client.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui" style="background:#721c24;color:#f8d7da;padding:8px 16px;position:fixed;bottom:0;left:0;right:0;z-index:9999;font-family:monospace;font-size:13px;">
        <strong>Chyba:</strong> <span id="blazor-error-detail">Neznámá chyba</span>
        <a href="." class="reload" style="color:#f8d7da;margin-left:16px;">Reload</a>
        <span class="dismiss" style="cursor:pointer;margin-left:16px;">&#10005;</span>
    </div>
    <script src="lib/maplibre-gl/maplibre-gl.js"></script>
    <script src="js/map-interop.js?v=20260411"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script>
        window.addEventListener('error', function(e) {
            var detail = document.getElementById('blazor-error-detail');
            if (detail) detail.textContent = e.message || e.error?.toString() || 'JS error';
        });
        window.addEventListener('unhandledrejection', function(e) {
            var detail = document.getElementById('blazor-error-detail');
            if (detail) detail.textContent = e.reason?.message || e.reason?.toString() || 'Promise rejected';
        });
    </script>
</body>

</html>
