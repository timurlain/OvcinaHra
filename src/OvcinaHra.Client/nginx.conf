events { }

http {
    include mime.types;
    default_type application/octet-stream;
    types {
        application/wasm wasm;
    }

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # Blazor WASM SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|wasm|dll|dat|blat|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript application/wasm;
        gzip_min_length 256;
    }
}
