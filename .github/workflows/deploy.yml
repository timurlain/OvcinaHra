name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ovcinaacr.azurecr.io
  API_IMAGE: ovcinaacr.azurecr.io/ovcinahra-api
  CLIENT_IMAGE: ovcinaacr.azurecr.io/ovcinahra-web
  RESOURCE_GROUP: ovcina
  API_CONTAINER_APP: ovcinahra-api
  CLIENT_CONTAINER_APP: ovcinahra-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/OvcinaHra.Api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          build-args: |
            DEVEXPRESS_NUGET_SOURCE=${{ secrets.DEVEXPRESS_NUGET_SOURCE }}
            DEVEXPRESS_LICENSE_CONTENT=${{ secrets.DEVEXPRESS_LICENSE_CONTENT }}

      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/OvcinaHra.Client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
            ${{ env.CLIENT_IMAGE }}:latest
          build-args: |
            DEVEXPRESS_NUGET_SOURCE=${{ secrets.DEVEXPRESS_NUGET_SOURCE }}
            DEVEXPRESS_LICENSE_CONTENT=${{ secrets.DEVEXPRESS_LICENSE_CONTENT }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.API_CONTAINER_APP }}
          imageToDeploy: ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy Client to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CLIENT_CONTAINER_APP }}
          imageToDeploy: ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
